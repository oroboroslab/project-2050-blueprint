<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" fill="none">
  <defs>
    <radialGradient id="globeFill" cx="38%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#2a6fd6"/>
      <stop offset="55%" stop-color="#0b3d91"/>
      <stop offset="100%" stop-color="#001a4d"/>
    </radialGradient>
    <radialGradient id="globeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="80%" stop-color="#0b3d91" stop-opacity="0"/>
      <stop offset="100%" stop-color="#6aa8ff" stop-opacity="0.35"/>
    </radialGradient>
    <linearGradient id="highlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- outer atmospheric glow -->
  <circle cx="300" cy="300" r="290" fill="url(#globeGlow)"/>

  <!-- planet body -->
  <circle cx="300" cy="300" r="260" fill="url(#globeFill)"/>

  <!-- latitude lines -->
  <g stroke="#9fc3ff" stroke-width="1.2" fill="none" opacity="0.55">
    <ellipse cx="300" cy="300" rx="260" ry="30"/>
    <ellipse cx="300" cy="300" rx="260" ry="80"/>
    <ellipse cx="300" cy="300" rx="260" ry="140"/>
    <ellipse cx="300" cy="300" rx="260" ry="210"/>
  </g>

  <!-- longitude lines -->
  <g stroke="#9fc3ff" stroke-width="1.2" fill="none" opacity="0.55">
    <ellipse cx="300" cy="300" rx="30" ry="260"/>
    <ellipse cx="300" cy="300" rx="80" ry="260"/>
    <ellipse cx="300" cy="300" rx="140" ry="260"/>
    <ellipse cx="300" cy="300" rx="210" ry="260"/>
    <line x1="300" y1="40" x2="300" y2="560" stroke-width="1.2"/>
    <line x1="40" y1="300" x2="560" y2="300" stroke-width="1.2"/>
  </g>

  <!-- stylized continents -->
  <g fill="#e6f0ff" opacity="0.82">
    <!-- americas -->
    <path d="M190 215 q-18 25 -10 55 q10 35 -2 70 q-6 22 12 45 q18 22 10 55 q-4 16 8 30
             q14 15 30 5 q16 -10 10 -35 q-5 -22 8 -40 q12 -18 2 -45 q-10 -28 -20 -55
             q-10 -28 -30 -45 q-12 -10 -18 -5 z"/>
    <!-- africa + europe -->
    <path d="M305 170 q20 -5 35 10 q14 14 8 34 q-4 14 6 26 q14 18 8 42 q-6 22 6 42
             q10 18 -4 38 q-14 20 -34 22 q-20 2 -28 -18 q-8 -20 4 -40 q10 -18 -4 -36
             q-16 -22 -10 -50 q4 -22 13 -40 q4 -8 0 -30 z"/>
    <!-- asia -->
    <path d="M370 180 q30 -8 55 6 q25 14 40 38 q14 24 4 48 q-10 24 -34 30 q-26 6 -38 -14
             q-10 -18 -30 -20 q-18 -2 -16 -22 q2 -22 10 -38 q5 -12 9 -28 z"/>
    <!-- australia -->
    <path d="M400 400 q25 -10 48 6 q20 14 18 34 q-2 20 -26 26 q-24 6 -42 -8
             q-16 -12 -14 -30 q2 -16 16 -28 z"/>
  </g>

  <!-- lens highlight -->
  <circle cx="300" cy="300" r="260" fill="url(#highlight)"/>

  <!-- orbital ring -->
  <g stroke="#c9a227" stroke-width="1.5" fill="none" opacity="0.9">
    <ellipse cx="300" cy="300" rx="285" ry="90" transform="rotate(-18 300 300)"/>
    <circle cx="560" cy="220" r="4" fill="#c9a227"/>
  </g>
</svg>
